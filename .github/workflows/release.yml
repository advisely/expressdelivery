name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    # Required secrets for code signing (all optional — build succeeds unsigned if omitted):
    #   CSC_LINK          — Base64-encoded .pfx certificate or URL to .pfx file
    #   CSC_KEY_PASSWORD  — Password for the .pfx certificate
    # To encode a local .pfx: certutil -encode cert.pfx cert.b64 && copy cert.b64 to secret value
    runs-on: windows-latest

    steps:
      # actions/checkout@v5 (Node 24 compatible)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # actions/setup-node@v5 (Node 24 compatible)
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 2 OAuth2: refuse to build a release without the OAuth client
      # IDs/secrets — without them the OAuth sign-in flows for Gmail and
      # Microsoft will compile but fail at runtime with an opaque error.
      # This step fails the workflow EARLY so the failure is loud, not silent.
      - name: Verify OAuth secrets are present
        shell: bash
        env:
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          if [ -z "$OAUTH_GOOGLE_CLIENT_ID" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_SECRET secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_MICROSOFT_CLIENT_ID" ]; then
            echo "::error::OAUTH_MICROSOFT_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required OAuth secrets are missing — refusing to build a release without OAuth credentials. Configure them in repository Settings → Secrets and variables → Actions before retrying."
            exit 1
          fi
          echo "All OAuth secrets present."

      - name: Build Electron app
        env:
          # Phase 2 OAuth2: Vite inlines VITE_* env vars at build time.
          # These three are read by electron/oauth/clientConfig.ts via import.meta.env
          # and are required for the Gmail + Microsoft sign-in flows to work.
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          npx tsc
          npx vite build

      # E2E console health gate — must pass before packaging
      # pretest:e2e rebuilds better-sqlite3 for Electron ABI
      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      - name: E2E console health
        run: npm run test:e2e -- --grep "Console Health"

      # Rebuild better-sqlite3 for Electron ABI (posttest:e2e restores host,
      # but electron-builder needs Electron ABI)
      - name: Rebuild native deps for packaging
        run: npx @electron/rebuild -m . --only better-sqlite3 --force

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # OAuth secrets re-injected for the package step in case any
          # post-build hook re-runs vite (defense in depth).
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}

      - name: Verify code signature
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer found to verify"; exit 1 }
          Write-Host "Verifying signature on: $($installer.FullName)"
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa /v "$($installer.FullName)"
          if ($LASTEXITCODE -ne 0) { Write-Error "Signature verification failed"; exit 1 }
          Write-Host "Signature verification passed."

  build-linux:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v5 (Node 24 compatible)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # actions/setup-node@v5 (Node 24 compatible)
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - name: Install cross-compilation toolchain for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 2 OAuth2: same secret pre-flight check as the Windows job.
      - name: Verify OAuth secrets are present
        shell: bash
        env:
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          if [ -z "$OAUTH_GOOGLE_CLIENT_ID" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_SECRET secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_MICROSOFT_CLIENT_ID" ]; then
            echo "::error::OAUTH_MICROSOFT_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required OAuth secrets are missing — refusing to build a release without OAuth credentials. Configure them in repository Settings → Secrets and variables → Actions before retrying."
            exit 1
          fi
          echo "All OAuth secrets present."

      - name: Build Electron app
        env:
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          npx tsc
          npx vite build

      # E2E console health gate — must pass before packaging
      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      - name: E2E console health
        run: xvfb-run --auto-servernum npm run test:e2e -- --grep "Console Health"

      # Rebuild better-sqlite3 for Electron ABI (posttest:e2e restores host)
      - name: Rebuild native deps for packaging
        run: npx @electron/rebuild -m . --only better-sqlite3 --force

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
