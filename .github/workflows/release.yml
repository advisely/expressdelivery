name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    # Required secrets for code signing (all optional — build succeeds unsigned if omitted):
    #   CSC_LINK          — Base64-encoded .pfx certificate or URL to .pfx file
    #   CSC_KEY_PASSWORD  — Password for the .pfx certificate
    # To encode a local .pfx: certutil -encode cert.pfx cert.b64 && copy cert.b64 to secret value
    runs-on: windows-latest

    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and package
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Verify code signature
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer found to verify"; exit 1 }
          Write-Host "Verifying signature on: $($installer.FullName)"
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa /v "$($installer.FullName)"
          if ($LASTEXITCODE -ne 0) { Write-Error "Signature verification failed"; exit 1 }
          Write-Host "Signature verification passed."

      # actions/upload-artifact@v4.6.2
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-installer
          path: release/**/*Setup*.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install cross-compilation toolchain for ARM64
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and package
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # actions/upload-artifact@v4.6.2
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-packages
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/download-artifact@v4.3.0
      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: windows-installer
          path: artifacts/windows

      # actions/download-artifact@v4.3.0
      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-packages
          path: artifacts/linux

      # softprops/action-gh-release@v2.2.1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/**/*Setup*.exe
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
