name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    # Required secrets for code signing (all optional — build succeeds unsigned if omitted):
    #   CSC_LINK          — Base64-encoded .pfx certificate or URL to .pfx file
    #   CSC_KEY_PASSWORD  — Password for the .pfx certificate
    # To encode a local .pfx: certutil -encode cert.pfx cert.b64 && copy cert.b64 to secret value
    runs-on: windows-latest

    steps:
      # actions/checkout@v5 (Node 24 compatible)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v5 (Node 24 compatible)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 2 OAuth2: refuse to build a release without the OAuth client
      # IDs/secrets — without them the OAuth sign-in flows for Gmail and
      # Microsoft will compile but fail at runtime with an opaque error.
      # This step fails the workflow EARLY so the failure is loud, not silent.
      - name: Verify OAuth secrets are present
        shell: bash
        env:
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          if [ -z "$OAUTH_GOOGLE_CLIENT_ID" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_SECRET secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_MICROSOFT_CLIENT_ID" ]; then
            echo "::error::OAUTH_MICROSOFT_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required OAuth secrets are missing — refusing to build a release without OAuth credentials. Configure them in repository Settings → Secrets and variables → Actions before retrying."
            exit 1
          fi
          echo "All OAuth secrets present."

      - name: Build Electron app
        env:
          # Phase 2 OAuth2: Vite inlines VITE_* env vars at build time.
          # These three are read by electron/oauth/clientConfig.ts via import.meta.env
          # and are required for the Gmail + Microsoft sign-in flows to work.
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          npx tsc
          npx vite build

      # E2E console health gate — must pass before packaging
      # pretest:e2e rebuilds better-sqlite3 for Electron ABI
      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      - name: E2E console health
        run: npm run test:e2e -- --grep "Console Health"

      # Rebuild better-sqlite3 for Electron ABI (posttest:e2e restores host,
      # but electron-builder needs Electron ABI)
      - name: Rebuild native deps for packaging
        run: npx @electron/rebuild -m . --only better-sqlite3 --force

      - name: Package and publish to GitHub Releases
        # Build both x64 and arm64 Windows targets (NSIS installer + portable ZIP for each).
        # better-sqlite3 arm64 prebuilt is pulled from the npm prebuild on x64 runners;
        # if the prebuild is missing, electron-builder falls back to building from source.
        run: npx electron-builder --win --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # OAuth secrets re-injected for the package step in case any
          # post-build hook re-runs vite (defense in depth).
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}

      - name: Verify code signature
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer found to verify"; exit 1 }
          Write-Host "Verifying signature on: $($installer.FullName)"
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa /v "$($installer.FullName)"
          if ($LASTEXITCODE -ne 0) { Write-Error "Signature verification failed"; exit 1 }
          Write-Host "Signature verification passed."

  build-linux:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v5 (Node 24 compatible)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v5 (Node 24 compatible)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install cross-compilation toolchain for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 2 OAuth2: same secret pre-flight check as the Windows job.
      - name: Verify OAuth secrets are present
        shell: bash
        env:
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          if [ -z "$OAUTH_GOOGLE_CLIENT_ID" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_SECRET secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_MICROSOFT_CLIENT_ID" ]; then
            echo "::error::OAUTH_MICROSOFT_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required OAuth secrets are missing — refusing to build a release without OAuth credentials. Configure them in repository Settings → Secrets and variables → Actions before retrying."
            exit 1
          fi
          echo "All OAuth secrets present."

      - name: Build Electron app
        env:
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          npx tsc
          npx vite build

      # E2E console health gate — must pass before packaging
      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      - name: E2E console health
        run: xvfb-run --auto-servernum npm run test:e2e -- --grep "Console Health"

      # Rebuild better-sqlite3 for Electron ABI (posttest:e2e restores host)
      - name: Rebuild native deps for packaging
        run: npx @electron/rebuild -m . --only better-sqlite3 --force

      - name: Package and publish to GitHub Releases
        # Build both x64 and arm64 Linux targets. The aarch64 cross-compile
        # toolchain installed above is picked up by @electron/rebuild when
        # electron-builder invokes it for the arm64 target. Produces:
        # .deb, .AppImage, and .rpm for both x64 and arm64 (6 artifacts).
        run: npx electron-builder --linux --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}

  build-macos:
    runs-on: macos-latest

    steps:
      # actions/checkout@v5 (Node 24 compatible)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v5 (Node 24 compatible)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Phase 2 OAuth2: same secret pre-flight check as the other jobs.
      - name: Verify OAuth secrets are present
        shell: bash
        env:
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          if [ -z "$OAUTH_GOOGLE_CLIENT_ID" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::OAUTH_GOOGLE_CLIENT_SECRET secret is missing"
            missing=1
          fi
          if [ -z "$OAUTH_MICROSOFT_CLIENT_ID" ]; then
            echo "::error::OAUTH_MICROSOFT_CLIENT_ID secret is missing"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required OAuth secrets are missing — refusing to build a release without OAuth credentials. Configure them in repository Settings → Secrets and variables → Actions before retrying."
            exit 1
          fi
          echo "All OAuth secrets present."

      - name: Build Electron app
        env:
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          npx tsc
          npx vite build

      # E2E console health gate — must pass before packaging.
      # macos-latest is arm64 (Apple Silicon) since late 2024. Chromium
      # launches headless without any xvfb shim.
      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      - name: E2E console health
        run: npm run test:e2e -- --grep "Console Health"

      # Rebuild better-sqlite3 for Electron ABI on the host arch.
      # The macOS runner is Apple Silicon — @electron/rebuild picks up the
      # native arch automatically. Universal binaries handle both x64 and
      # arm64 in a single .app bundle via electron-builder's own lipo step.
      - name: Rebuild native deps for packaging
        run: npx @electron/rebuild -m . --only better-sqlite3 --force

      # v1.18.7: export macOS signing env vars ONLY if the corresponding
      # secret is present. Empty-string CSC_LINK trips electron-builder into
      # treating the repo root as a .p12 path → "not a file" error. When the
      # secrets are absent, explicitly disable signing discovery so the build
      # produces an unsigned .dmg (acceptable for unsigned distribution).
      - name: Configure macOS signing env
        env:
          CSC_LINK_MAC: ${{ secrets.CSC_LINK_MAC }}
          CSC_KEY_PASSWORD_MAC: ${{ secrets.CSC_KEY_PASSWORD_MAC }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [ -n "$CSC_LINK_MAC" ]; then
            {
              echo "CSC_LINK=$CSC_LINK_MAC"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD_MAC"
            } >> "$GITHUB_ENV"
            echo "Code signing enabled: CSC_LINK secret is set."
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "Code signing disabled: CSC_LINK_MAC secret not set (unsigned build)."
          fi
          # Notarization only runs when code signing succeeded. Only export
          # Apple credentials when all three are present to avoid triggering
          # a partial notarization attempt.
          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            {
              echo "APPLE_ID=$APPLE_ID_SECRET"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET"
            } >> "$GITHUB_ENV"
            echo "Notarization enabled."
          else
            echo "Notarization disabled: one or more Apple credentials missing."
          fi

      - name: Package and publish to GitHub Releases
        # Build both x64 and arm64 dmg + zip targets. electron-builder
        # downloads the opposite-arch Electron binary and lipos the native
        # modules into a universal package per target. Signing + notarization
        # env vars are set conditionally by the prior step.
        run: npx electron-builder --mac --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          VITE_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
