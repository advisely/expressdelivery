name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality-gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: TypeScript check
        run: npx tsc --noEmit

      # Build for E2E (tsc + vite only, no electron-builder packaging)
      - name: Build Electron app
        run: |
          npx tsc
          npx vite build

      - name: Install Playwright Electron
        run: npx playwright install --with-deps chromium

      # npm run test:e2e handles rebuild for Electron ABI + restore for host
      - name: E2E console health (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e -- --grep "Console Health"

      - name: E2E console health (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e -- --grep "Console Health"
